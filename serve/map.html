<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAL Map</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@5.6.1/dist/maplibre-gl.js"></script>
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172026;
    }
    #toolbar {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(23, 32, 38, 0.14);
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(23, 32, 38, 0.16);
    }
    button {
      min-width: 38px;
      height: 32px;
      border: 1px solid rgba(23, 32, 38, 0.22);
      border-radius: 4px;
      background: #ffffff;
      color: #172026;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }
    button:disabled {
      color: #8a959c;
      cursor: not-allowed;
    }
    #status {
      min-width: 130px;
      font-size: 13px;
      white-space: nowrap;
    }
    .maplibregl-popup-content {
      max-width: min(360px, 80vw);
      overflow-wrap: anywhere;
      font-size: 12px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="toolbar">
    <button id="prev" type="button" title="Previous geometry batch" aria-label="Previous geometry batch">&#8592;</button>
    <span id="status">Loading...</span>
    <button id="next" type="button" title="Next geometry batch" aria-label="Next geometry batch">&#8594;</button>
  </div>
  <script>
    const pageSize = 100;
    let offset = 0;
    const status = document.getElementById('status');
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');

    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/liberty',
      center: [0, 20],
      zoom: 1.4
    });
    map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');

    map.on('load', () => {
      map.addSource('sal-geometries', {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] }
      });
      map.addLayer({
        id: 'sal-polygons',
        type: 'fill',
        source: 'sal-geometries',
        filter: ['any', ['==', ['geometry-type'], 'Polygon'], ['==', ['geometry-type'], 'MultiPolygon']],
        paint: { 'fill-color': '#277da1', 'fill-opacity': 0.28 }
      });
      map.addLayer({
        id: 'sal-lines',
        type: 'line',
        source: 'sal-geometries',
        filter: ['any', ['==', ['geometry-type'], 'LineString'], ['==', ['geometry-type'], 'MultiLineString']],
        paint: { 'line-color': '#f3722c', 'line-width': 3 }
      });
      map.addLayer({
        id: 'sal-points',
        type: 'circle',
        source: 'sal-geometries',
        filter: ['any', ['==', ['geometry-type'], 'Point'], ['==', ['geometry-type'], 'MultiPoint']],
        paint: {
          'circle-color': '#43aa8b',
          'circle-radius': 6,
          'circle-stroke-color': '#ffffff',
          'circle-stroke-width': 1.5
        }
      });
      for (const layer of ['sal-polygons', 'sal-lines', 'sal-points']) {
        map.on('click', layer, event => {
          const feature = event.features && event.features[0];
          if (!feature) return;
          const props = feature.properties || {};
          new maplibregl.Popup()
            .setLngLat(event.lngLat)
            .setHTML('<strong>' + escapeHTML(props.subject || '') + '</strong><br>' + escapeHTML(props.predicate || '') + '<br>' + escapeHTML(props.object || ''))
            .addTo(map);
        });
        map.on('mouseenter', layer, () => { map.getCanvas().style.cursor = 'pointer'; });
        map.on('mouseleave', layer, () => { map.getCanvas().style.cursor = ''; });
      }
      loadBatch();
    });

    prev.addEventListener('click', () => {
      offset = Math.max(0, offset - pageSize);
      loadBatch();
    });
    next.addEventListener('click', () => {
      offset += pageSize;
      loadBatch();
    });

    async function loadBatch() {
      prev.disabled = offset === 0;
      next.disabled = true;
      status.textContent = 'Loading...';
      try {
        const response = await fetch('/geometries?limit=' + pageSize + '&offset=' + offset, { headers: { Accept: 'application/geo+json' } });
        if (!response.ok) throw new Error(await response.text());
        const data = await response.json();
        map.getSource('sal-geometries').setData(data);
        const count = data.features ? data.features.length : 0;
        status.textContent = count === 0 ? 'No geometries' : (offset + 1) + '-' + (offset + count);
        next.disabled = count < pageSize;
        fitToFeatures(data.features || []);
      } catch (error) {
        status.textContent = 'Map data failed';
        console.error(error);
      }
    }

    function fitToFeatures(features) {
      const bounds = new maplibregl.LngLatBounds();
      for (const feature of features) extendBounds(bounds, feature.geometry);
      if (!bounds.isEmpty()) map.fitBounds(bounds, { padding: 56, maxZoom: 14, duration: 400 });
    }

    function extendBounds(bounds, geometry) {
      if (!geometry) return;
      visitCoordinates(geometry.coordinates, coord => bounds.extend(coord));
    }

    function visitCoordinates(value, callback) {
      if (!Array.isArray(value)) return;
      if (typeof value[0] === 'number' && typeof value[1] === 'number') {
        callback(value);
        return;
      }
      for (const child of value) visitCoordinates(child, callback);
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      })[char]);
    }
  </script>
</body>
</html>
